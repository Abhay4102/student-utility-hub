kind = "web"
previewPath = "/"
title = "Student Tools Hub"
version = "1.0.0"
id = "artifacts/student-tools"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20384

[services.development]
run = "pnpm --filter @workspace/student-tools run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/student-tools", "run", "build" ]
publicDir = "artifacts/student-tools/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20384"
BASE_PATH = "/"
